<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Adam James</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Raleway:wght@200;300&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; background: #000000 !important; color: #e8e4de; font-family: 'Cormorant Garamond', Georgia, serif; -webkit-font-smoothing: antialiased; }
    body { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100dvh; padding: 2rem 1.5rem; background: #000000 !important; position: relative; overflow: hidden; }
    #particles { position: fixed; inset: 0; pointer-events: none; z-index: 2; }
    .container { position: relative; z-index: 3; display: flex; flex-direction: column; align-items: center; width: 100%; max-width: 360px; }
    .name { font-weight: 300; font-size: clamp(1rem, 4.5vw, 1.25rem); letter-spacing: 0.35em; text-transform: uppercase; color: #e8e4de; opacity: 0; animation: fadeUp 1.4s cubic-bezier(0.22, 1, 0.36, 1) 0.3s forwards; margin-bottom: 0.5rem; cursor: pointer; user-select: none; -webkit-user-select: none; }
    .rule { width: 32px; height: 1px; background: rgba(232,228,222,0.38); margin: 0 auto 0.6rem; opacity: 0; animation: fadeIn 1s ease 0.7s forwards; }
    .tagline { font-weight: 300; font-style: italic; font-size: clamp(0.78rem, 3.2vw, 0.88rem); letter-spacing: 0.04em; color: rgba(232,228,222,0.5); text-align: center; line-height: 1.6; opacity: 0; animation: fadeUp 1s cubic-bezier(0.22,1,0.36,1) 0.9s forwards; margin-bottom: 2.8rem; }
    .illustration-wrap { position: relative; width: min(260px, 72vw); opacity: 0; animation: firstAppear 2.5s cubic-bezier(0.22,1,0.36,1) 1s forwards; }
    .illustration-wrap.breathing { animation: none; transition: opacity 3s ease-in-out, filter 3s ease-in-out; }
    .illustration { width: 100%; display: block; filter: contrast(1.1); }
    .illustration-wrap::after { content: ''; position: absolute; inset: -20px; background: radial-gradient(ellipse at center, rgba(232,228,222,0.06) 0%, transparent 70%); opacity: 0; transition: opacity 3s ease-in-out; pointer-events: none; border-radius: 50%; }
    .illustration-wrap.glow-on::after { opacity: 1; }
    .novel-note { margin-top: 2.4rem; font-family: 'Raleway', sans-serif; font-weight: 200; font-size: clamp(0.62rem, 2.6vw, 0.7rem); letter-spacing: 0.22em; text-transform: uppercase; color: rgba(232,228,222,0.38); text-align: center; opacity: 0; animation: fadeUp 1s cubic-bezier(0.22,1,0.36,1) 1.3s forwards; }
    .novel-note::before { content: '— '; }
    .novel-note::after { content: ' —'; }
    .typewriter-overlay { position: fixed; inset: 0; background: #000000; display: flex; align-items: center; justify-content: center; padding: 2.5rem; z-index: 200; opacity: 0; pointer-events: none; transition: opacity 0.8s ease; }
    .typewriter-overlay.active { opacity: 1; pointer-events: all; }
    .typewriter-text { font-family: 'Cormorant Garamond', serif; font-weight: 300; font-style: italic; font-size: clamp(1.05rem, 4.2vw, 1.3rem); line-height: 1.85; color: rgba(232,228,222,0.88); text-align: left; max-width: 320px; letter-spacing: 0.01em; }
    .cursor { display: inline-block; width: 1px; height: 1.1em; background: rgba(232,228,222,0.7); margin-left: 2px; vertical-align: text-bottom; animation: blink 1s step-end infinite; }
    .cursor.done { animation: none; opacity: 0; }
    .dismiss { position: absolute; bottom: 3rem; left: 50%; transform: translateX(-50%); font-family: 'Raleway', sans-serif; font-weight: 200; font-size: 0.6rem; letter-spacing: 0.25em; text-transform: uppercase; color: rgba(232,228,222,0.25); opacity: 1; transition: opacity 1s ease; cursor: pointer; white-space: nowrap; }
    @keyframes firstAppear { from { opacity: 0; filter: blur(8px); } to { opacity: 1; filter: blur(0px); } }
    @keyframes fadeUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }
  </style>
</head>
<body>
  <canvas id="particles"></canvas>
  <div class="container">
    <p class="name" id="name">Adam James</p>
    <div class="rule"></div>
    <p class="tagline">Fiction writer<br>New York</p>
    <div class="illustration-wrap" id="illus">
      <img class="illustration" src="./053D9C9F-E747-4D03-8FAA-0E2BD5676DCC.PNG" alt="Yucca plant illustration" />
    </div>
    <p class="novel-note">at work on a first novel</p>
  </div>
  <div class="typewriter-overlay" id="overlay">
    <p class="typewriter-text" id="twText"><span class="cursor"></span></p>
    <p class="dismiss" id="dismiss">tap to close</p>
  </div>
  <script>
    var canvas = document.getElementById('particles');
    var ctx = canvas.getContext('2d');
    var W, H, particles;
    function resize() { W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; }
    resize();
    window.addEventListener('resize', function() { resize(); initParticles(); });
    function initParticles() {
      var count = Math.floor((W * H) / 18000);
      particles = [];
      for (var i = 0; i < count; i++) {
        particles.push({ x: Math.random()*W, y: Math.random()*H, r: 0.4+Math.random()*1.0, vx: (Math.random()-0.5)*0.12, vy: -0.08-Math.random()*0.15, alpha: 0.1+Math.random()*0.35, flicker: Math.random()*Math.PI*2 });
      }
    }
    initParticles();
    function drawParticles() {
      ctx.clearRect(0, 0, W, H);
      var t = Date.now() / 1000;
      for (var i = 0; i < particles.length; i++) {
        var p = particles[i];
        var a = p.alpha * (0.6 + 0.4 * Math.sin(t * 0.8 + p.flicker));
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
        ctx.fillStyle = 'rgba(232,228,222,' + a + ')';
        ctx.fill();
        p.x += p.vx; p.y += p.vy;
        if (p.y < -5) p.y = H + 5;
        if (p.x < -5) p.x = W + 5;
        if (p.x > W+5) p.x = -5;
      }
      requestAnimationFrame(drawParticles);
    }
    drawParticles();
    var wrap = document.getElementById('illus');
    setTimeout(function() { wrap.classList.add('breathing'); breath(); }, 3800);
    var inhale = false;
    function breath() {
      inhale = !inhale;
      if (inhale) { wrap.style.opacity = '1'; wrap.style.filter = 'blur(0px) contrast(1.1)'; wrap.classList.add('glow-on'); }
      else { wrap.style.opacity = '0.45'; wrap.style.filter = 'blur(1px) contrast(1.1)'; wrap.classList.remove('glow-on'); }
      var hold = inhale ? 3200 + Math.random()*800 : 4500 + Math.random()*1200;
      setTimeout(breath, hold);
    }
    var passage = "The train flew by, hundreds of cars layering their wind into the storm, as he rolled away from the hurtling metal onto his back.\nDon\u2019t you think you should look after her.\nThe raindrops were hard. He couldn\u2019t open his eyes. The red curls cascaded to her shoulders. Rivulets of blood.\nShe smiled.";
    var nameEl = document.getElementById('name');
    var overlay = document.getElementById('overlay');
    var twText = document.getElementById('twText');
    var dismissEl = document.getElementById('dismiss');
    var typing = false;
    var timeouts = [];
    nameEl.addEventListener('click', trigger);
    nameEl.addEventListener('touchend', function(e) { e.preventDefault(); trigger(); });
    dismissEl.addEventListener('click', closeOverlay);
    dismissEl.addEventListener('touchend', function(e) { e.preventDefault(); closeOverlay(); });
    function trigger() { if (typing) return; startTypewriter(); }
    function startTypewriter() {
      typing = true;
      overlay.classList.add('active');
      twText.innerHTML = '<span class="cursor"></span>';
      var chars = passage.split('');
      var i = 0;
      function typeNext() {
        if (i < chars.length) {
          var ch = chars[i];
          if (ch === '\n') {
            var br1 = document.createElement('br');
            var br2 = document.createElement('br');
            twText.insertBefore(br2, twText.querySelector('.cursor'));
            twText.insertBefore(br1, br2);
            i++;
            timeouts.push(setTimeout(typeNext, 400));
          } else {
            twText.insertBefore(document.createTextNode(ch), twText.querySelector('.cursor'));
            i++;
            var delay = 28 + Math.random()*22;
            if (ch === '.' || ch === '?') delay = 320 + Math.random()*180;
            else if (ch === ',') delay = 120 + Math.random()*60;
            timeouts.push(setTimeout(typeNext, delay));
          }
        } else {
          twText.querySelector('.cursor').classList.add('done');
        }
      }
      typeNext();
    }
    function closeOverlay() {
      overlay.classList.remove('active');
      timeouts.forEach(clearTimeout);
      timeouts = [];
      typing = false;
    }
  </script>
</body>
</html>
